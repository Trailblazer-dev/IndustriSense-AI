{% extends "base.html" %}

{% block title %}Error - IndustriSense AI{% endblock %}

{% block content %}
<div class="error-page">
    <div class="error-container">
        <h1>⚠️ Error</h1>
        <p class="error-message">{{ message }}</p>
        <div class="error-actions">
            <a href="/" class="btn btn-primary">Back to Dashboard</a>
            <a href="/about" class="btn btn-secondary">Learn More</a>
        </div>
    </div>
</div>

<style>
.error-page {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 400px;
}

.error-container {
    text-align: center;
    background: white;
    padding: 50px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
}

.error-container h1 {
    color: #f5576c;
    margin: 0 0 20px 0;
    font-size: 48px;
}

.error-message {
    color: #666;
    font-size: 18px;
    margin-bottom: 30px;
}

.error-actions {
    display: flex;
    gap: 15px;
    justify-content: center;
}
</style>
{% endblock %}
