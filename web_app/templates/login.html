{% extends "base.html" %}

{% block title %}Login - IndustriSense AI{% endblock %}

{% block content %}
<div class="container-fluid px-4 py-5 d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="stat-card p-4 border-0 shadow-lg" style="max-width: 450px; width: 100%;">
        <div class="text-center mb-4">
            <div class="bg-accent bg-opacity-10 p-3 rounded-circle d-inline-block mb-3">
                <i class="fas fa-shield-halved text-accent fs-3"></i>
            </div>
            <h3 class="fw-bold mb-1">Welcome Back</h3>
            <p class="text-muted small">Sign in to your fleet monitor dashboard</p>
        </div>

        <form action="{{ url_for('auth.login') }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label class="metric-label-small mb-2">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                    <input type="email" name="email" class="form-control border-start-0" placeholder="name@company.com" required>
                </div>
            </div>

            <div class="mb-3">
                <div class="d-flex justify-content-between align-items-center">
                    <label class="metric-label-small mb-2">Password</label>
                    <a href="#" class="small text-accent text-decoration-none">Forgot?</a>
                </div>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                    <input type="password" name="password" class="form-control border-start-0" placeholder="••••••••" required>
                </div>
            </div>

            <div class="mb-4 form-check">
                <input type="checkbox" name="remember" class="form-check-input" id="rememberCheck">
                <label class="form-check-label small text-muted" for="rememberCheck">Remember this device</label>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 shadow-sm mb-3">
                <i class="fas fa-sign-in-alt me-2"></i>Sign In
            </button>

            <div class="text-center">
                <p class="small text-muted mb-0">New to the platform? <a href="{{ url_for('auth.register') }}" class="text-accent fw-bold text-decoration-none">Create Account</a></p>
            </div>
        </form>
    </div>
</div>
{% endblock %}
