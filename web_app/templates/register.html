{% extends "base.html" %}

{% block title %}Register - IndustriSense AI{% endblock %}

{% block content %}
<div class="container-fluid px-4 py-5 d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="stat-card p-4 border-0 shadow-lg" style="max-width: 450px; width: 100%;">
        <div class="text-center mb-4">
            <div class="bg-primary bg-opacity-10 p-3 rounded-circle d-inline-block mb-3">
                <i class="fas fa-user-plus text-primary fs-3"></i>
            </div>
            <h3 class="fw-bold mb-1">Create Account</h3>
            <p class="text-muted small">Join IndustriSense AI for predictive excellence</p>
        </div>

        <form action="{{ url_for('auth.register') }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label class="metric-label-small mb-2">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                    <input type="email" name="email" class="form-control border-start-0" placeholder="name@company.com" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="metric-label-small mb-2">Company Name</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-building text-muted"></i></span>
                    <input type="text" name="company" class="form-control border-start-0" placeholder="Industrial Corp" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="metric-label-small mb-2">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                    <input type="password" name="password" class="form-control border-start-0" placeholder="••••••••" required>
                </div>
                <small class="text-muted extra-small mt-1 d-block">Minimum 8 characters with numbers and symbols recommended.</small>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 shadow-sm mb-3">
                <i class="fas fa-check-circle me-2"></i>Register Account
            </button>

            <div class="text-center">
                <p class="small text-muted mb-0">Already have an account? <a href="{{ url_for('auth.login') }}" class="text-accent fw-bold text-decoration-none">Login Here</a></p>
            </div>
        </form>
    </div>
</div>
{% endblock %}
